        #  weight: 3
        - name: Tags
          url: /tags/
          weight: 3     
        # - name: Newsletter
        #   url: https://pmichaillat.substack.com
        #   weight: 4

params:
    description: "I am a postdoctoral fellow at the Unversity of Turin, Dept. of Historical Studies. I work on social history, data mining and data visualization applied to cuneiform sources, historical geography, and digital humanities."
    author: Erica Scarpa
    googleAnalyticsID: ""
    DateFormat: "January 2006"
    defaultTheme: light
    hideFooter: true
    disableThemeToggle: true
    ShowShareButtons: false
    ShowReadingTime: false
    disableSpecial1stPost: true
    disableAnchoredHeadings: true
    ShowPostNavLinks: false
    ShowBreadCrumbs: false
    ShowCodeCopyButtons: true
    ShowRssButtonInSectionTermList: false
    ShowToc: false
    disableScrollToTop: true
    TocOpen: true
    ShowWordCount: false
    UseHugoToc: true
    comments: false
    math: true
    profileMode:
          enabled: true
          title: Erica Scarpa
          subtitle: "I am a postdoctoral fellow at the Unversity of Turin, Dept. of Historical Studies. I work on social history, data mining and data visualization applied to cuneiform sources, historical geography, and digital humanities."
          imageUrl: "prof_pic.png"
          imageWidth: 170
          imageHeight: 
          imageTitle:
          buttons:
            - name: Papers
              url: /papers/
            - name: Projects
              url: /projects/
            - name: Design
              url: /design/
    socialIcons:
        - name: CV
          url: /cv.pdf
        - name: Email
          url: mailto:erica.scarpa@gmail.com
        - name: Google Scholar
          url: https://scholar.google.com/citations?user=Yd4Me1UAAAAJ&hl=it
        - name: ORCID
          url: https://orcid.org/0000-0001-6250-304X
        - name: Twitter
          url: https://twitter.com/erica_scarpa
        - name: GitHub
          url: https://github.com/erica-scarpa

    assets:
        disableHLJS: true
        disableScrollBarStyle: true
    cover:
        hiddenInList: true
        hiddenInSingle: true
    label:
      text: "Erica Scarpa"
      icon: /favicon.ico
      iconHeight: 18

markup:
    goldmark:
        renderer:
            unsafe: true
    highlight:
        guessSyntax: true
        style: xcode
    tableOfContents:
        endLevel: 2
        ordered: false
        startLevel: 2

