baseURL: "https://erica-scarpa.github.io/" 
title: Erica Scarpa
paginate: 20
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true

social:
    twitter: erica_scarpa

taxonomies:
    tag: tags

menu:
    main:
        - name: Papers
          url: /papers/
          weight: 1
        - name: Projects
          url: /projects/
          weight: 2
        #- name: Design
